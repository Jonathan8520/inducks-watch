name: inducks-watch

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Probe dump
        run: |
          HDRS=$(curl -sIL --max-time 30 https://inducks.org/inducks/isv.tgz || true)
          CODE=$(printf '%s' "$HDRS" | grep -oiE '^HTTP/[0-9.]+ [0-9]+' | tail -1 | awk '{print $2}')
          CTYPE=$(printf '%s' "$HDRS" | grep -oiE '^content-type:.*' | tail -1 | tr -d '\r')
          CLEN=$(printf '%s' "$HDRS" | grep -oiE '^content-length:.*' | tail -1 | tr -d '\r')
          echo "HTTP=${CODE:-none}"
          echo "${CTYPE:-content-type: (absent)}"
          echo "${CLEN:-content-length: (absent)}"

          # Un 200 ne suffit pas : Anubis ou une page de maintenance peuvent
          # repondre 200 avec du HTML. On exige un type de contenu binaire.
          if [ "$CODE" = "200" ] && printf '%s' "$CTYPE" | grep -qiE 'gzip|octet-stream|x-tar|application/tar'; then
            echo "status=200" >> $GITHUB_ENV
            echo "Dump disponible."
          else
            echo "status=notyet" >> $GITHUB_ENV
            echo "Toujours indisponible (ou reponse non binaire)."
          fi

      - name: Download if back
        if: env.status == '200'
        run: |
          # -f : echoue sur erreur HTTP au lieu d'enregistrer la page d'erreur
          # --retry : reprend sur coupure reseau (fichier ~109 Mo)
          curl -fL --retry 3 --retry-delay 5 --max-time 900 \
            -o isv.tgz https://inducks.org/inducks/isv.tgz

          echo "--- type reel ---"
          file isv.tgz

          # Garde-fou : si ce n'est pas une archive gzip valide, on stoppe ici
          # plutot que d'ouvrir une issue annoncant un dump qu'on n'a pas.
          if ! tar tzf isv.tgz > /dev/null 2>&1; then
            echo "::error::Le fichier telecharge n'est pas une archive tar.gz valide."
            head -c 500 isv.tgz
            exit 1
          fi

          SHA=$(sha256sum isv.tgz | awk '{print $1}')
          SIZE=$(du -h isv.tgz | awk '{print $1}')
          BYTES=$(stat -c%s isv.tgz)
          COUNT=$(tar tzf isv.tgz | wc -l)

          echo "sha=$SHA" >> $GITHUB_ENV
          echo "size=$SIZE" >> $GITHUB_ENV
          echo "bytes=$BYTES" >> $GITHUB_ENV
          echo "count=$COUNT" >> $GITHUB_ENV

          echo "--- $COUNT fichiers, $SIZE, sha256 $SHA ---"
          tar tzf isv.tgz | head -20

      - name: Upload artifact
        if: env.status == '200'
        uses: actions/upload-artifact@v4
        with:
          name: isv-${{ github.run_number }}
          path: isv.tgz
          retention-days: 90

      - name: Open issue if back
        if: env.status == '200'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TITLE="Le dump inducks isv.tgz est de retour"
          existing=$(gh issue list --state open --search "$TITLE in:title" --json number --jq 'length')
          if [ "$existing" -gt 0 ]; then
            echo "Une issue est deja ouverte, rien a signaler."
            exit 0
          fi
          BODY=$(printf '%s\n' \
            "Le dump \`isv.tgz\` repond de nouveau sur https://inducks.org/inducks/isv.tgz et l'archive a ete validee." \
            "" \
            "- **Taille :** ${{ env.size }} (${{ env.bytes }} octets)" \
            "- **Fichiers dans l'archive :** ${{ env.count }}" \
            "- **SHA256 :** \`${{ env.sha }}\`" \
            "- **Run :** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            "- **Artifact :** \`isv-${{ github.run_number }}\` (section Artifacts du run, conserve 90 jours)" \
            "" \
            "A comparer avec la sauvegarde communautaire du 5 juillet 2026 pour estimer" \
            "l'ecart d'indexation eventuellement perdu lors de la restauration." \
            "" \
            "_Issue ouverte automatiquement par inducks-watch. Ferme-la une fois le dump recupere pour rearmer la surveillance._")
          gh issue create --title "$TITLE" --body "$BODY"
